<section class="relative bg-primary py-32 px-8 md:px-16 overflow-hidden">

        <svg width="100%" height="100%" class="stroke-white/10 stroke-[0.5]">
            <pattern id="cta-grid-comp" width="60" height="60" patternUnits="userSpaceOnUse">
                <path d="M 60 0 L 0 0 0 60" fill="none" />
            </pattern>
            <rect width="100%" height="100%" fill="url(#cta-grid-comp)" />
        </svg>
    </div>
    
    <div class="max-w-[1920px] mx-auto relative z-10">
        <div class="flex flex-col items-center text-center space-y-12">
            <div class="space-y-4">
                <span class="text-secondary font-label-sm text-label-sm uppercase tracking-[0.4em] animate-pulse">Start Your Journey</span>
                <h2 class="font-display-xl text-4xl md:text-7xl text-white font-black uppercase tracking-tighter leading-none">
                    Transforming <br/><span class="text-secondary">Vision</span> into <br/>Reality.
                </h2>
            </div>
            
            <p class="font-body-lg text-slate-400 max-w-2xl text-lg md:text-xl leading-relaxed">
                Join our portfolio of premium architectural and interior projects. From initial consultation to final structural fabrication, we are your integrated partner.
            </p>
            
            <div class="pt-8">
                <a href="contact.html"
                    class="group relative inline-flex items-center justify-center px-12 py-5 bg-white text-primary font-black uppercase tracking-widest overflow-hidden transition-all duration-500 hover:text-white">
                    <span class="absolute inset-0 w-0 bg-secondary transition-all duration-500 ease-out group-hover:w-full"></span>
                    <span class="relative z-10 flex items-center gap-3">
                        Start a Consultation
                        <span class="material-symbols-outlined group-hover:translate-x-2 transition-transform">arrow_forward</span>
                    </span>
                </a>
            </div>
        </div>
    </div>
    
    <!-- Structural Line Animation -->
    <div class="absolute top-0 right-0 w-1/3 h-full pointer-events-none opacity-10">
        <svg viewBox="0 0 400 800" class="w-full h-full">
            <path class="draw-line" d="M0,0 L400,400 L0,800" fill="none" stroke="white" stroke-width="2" />
            <path class="draw-line-delayed" d="M100,0 L500,400 L100,800" fill="none" stroke="white" stroke-width="2" />
        </svg>
    </div>
</section>
